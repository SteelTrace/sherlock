# Build release binaries and publish a GitHub Release when a version tag is pushed (e.g. v0.4.0).
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package
        run: tar czvf sherlock-linux-x64.tar.gz -C target/release sherlock

      - uses: actions/upload-artifact@v4
        with:
          name: sherlock-linux-x64
          path: sherlock-linux-x64.tar.gz

  build-macos:
    name: macOS (ARM64 + x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package
        run: |
          tar czvf sherlock-macos-arm64.tar.gz -C target/aarch64-apple-darwin/release sherlock
          tar czvf sherlock-macos-x64.tar.gz -C target/x86_64-apple-darwin/release sherlock

      - uses: actions/upload-artifact@v4
        with:
          name: sherlock-macos-archives
          path: |
            sherlock-macos-arm64.tar.gz
            sherlock-macos-x64.tar.gz

  publish:
    name: Publish GitHub Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
